<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Santa Barbara — Fire Response Gap Analysis</title>
    <style>
      .app {
        /* AA-corrected tokens: muted text darkened to pass WCAG AA on white */
        --bg: #f6f7f9; --card: #ffffff; --border: #e4e7ec; --text: #101828;
        --text-secondary: #475467; --text-muted: #667085; /* 4.6:1 on white */
        --accent: #d12b2b; --accent-ui: #d12b2b; /* UI-affordance accent (lightened in dark) */
        --good: #94a3b8; --moderate: #e8900a; --poor: #d12b2b; --skeleton: #e4e7ec;
        --focus: #1d4ed8; --radius: 10px;
        display: flex; height: 100vh; color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .app[data-theme="dark"] {
        --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #f1f5f9;
        --text-secondary: #cbd5e1; --text-muted: #94a3b8; --skeleton: #334155;
        --accent-ui: #f87171; /* lightened so outlines/active text clear 3:1 on slate */
        --good: #64748b; --focus: #93c5fd;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      :focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: 4px; }
      #map { flex: 1; min-width: 50%; }
      .sidebar { width: 392px; flex: none; overflow-y: auto; background: var(--bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
      .head { position: sticky; top: 0; z-index: 2; background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 18px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
      .head h1 { font-size: 15px; margin: 0; letter-spacing: -0.01em; }
      .head .count { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
      .theme-btn { font: inherit; font-size: 15px; width: 32px; height: 32px; flex: none; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 8px; }
      .app-desc { margin: 0; padding: 12px 18px; font-size: 13px; line-height: 1.45; color: var(--text-secondary); background: var(--card); border-bottom: 1px solid var(--border); }
      .content { padding: 16px 18px 40px; display: flex; flex-direction: column; gap: 18px; }
      .block { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
      .block-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin: 0 0 10px; }
      .block-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
      .block-head .block-title { margin: 0; }
      /* Methodology / caveats */
      .method summary { cursor: pointer; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); list-style: none; }
      .method summary::-webkit-details-marker { display: none; }
      .method summary::before { content: "▾ "; }
      .method:not([open]) summary::before { content: "▸ "; }
      .method .body { margin-top: 10px; font-size: 12.5px; line-height: 1.5; color: var(--text-secondary); }
      .method .body p { margin: 0 0 8px; }
      .method .body strong { color: var(--text); }
      .method .caveat { border-left: 3px solid var(--moderate); padding-left: 10px; }
      .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
      .stat .v { font-size: 20px; font-weight: 700; line-height: 1.15; }
      .stat .l { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
      .bars { display: flex; flex-direction: column; gap: 6px; }
      .bar-row { display: grid; grid-template-columns: 96px 1fr 60px; align-items: center; gap: 8px; background: none; border: none; padding: 4px; border-radius: 6px; cursor: pointer; color: var(--text); font: inherit; text-align: left; }
      .bar-row:hover { background: var(--bg); }
      .bar-row.locked { box-shadow: inset 0 0 0 2px var(--accent-ui); }
      .bar-row.locked .bar-label::after { content: " ✓"; color: var(--accent-ui); font-weight: 700; }
      .bar-label { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .bar-track { height: 16px; background: var(--bg); border-radius: 4px; overflow: hidden; }
      .bar-fill { display: block; height: 100%; border-radius: 4px; }
      .bar-val { font-size: 11px; color: var(--text-secondary); text-align: right; font-variant-numeric: tabular-nums; }
      .dist { font-size: 13px; line-height: 1.5; color: var(--text-secondary); margin: 0; }
      .dist strong { color: var(--text); }
      .flt-help { font-size: 12px; color: var(--text-secondary); line-height: 1.45; margin: 0 0 12px; }
      .flt-group { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
      .flt-label { font-size: 12px; font-weight: 600; color: var(--text); }
      .flt-covs { display: flex; gap: 6px; flex-wrap: wrap; }
      .flt-chip { font: inherit; font-size: 12px; padding: 5px 12px; border-radius: 999px; cursor: pointer; color: var(--text-secondary); background: var(--bg); border: 1px solid var(--border); }
      .flt-chip.on { color: #fff; background: var(--chip); border-color: var(--chip); }
      .flt-hint { font-size: 11px; color: var(--text-muted); margin: 5px 0 10px; }
      .flt-count { font-size: 13px; font-weight: 600; color: var(--text-muted); margin: 10px 0 0; }
      .flt-count.active { color: var(--accent-ui); }
      .rank { display: flex; flex-direction: column; gap: 6px; }
      .rank-row { display: grid; grid-template-columns: 22px 1fr auto; align-items: center; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; cursor: pointer; color: var(--text); font: inherit; text-align: left; }
      .rank-row:hover { border-color: var(--accent-ui); }
      .rank-n { font-weight: 700; color: var(--accent-ui); font-size: 13px; }
      .rank-name { font-size: 13px; font-weight: 500; }
      .rank-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
      .rank-val { font-size: 12px; font-weight: 600; text-align: right; }
      .method-note { font-size: 11px; color: var(--text-muted); margin: 10px 0 0; line-height: 1.45; font-style: italic; }
      .toggles { display: flex; flex-direction: column; gap: 4px; }
      .toggle { display: flex; align-items: center; gap: 9px; font-size: 13px; padding: 4px 2px; cursor: pointer; }
      .toggle .badge { font-size: 10px; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 1px 6px; margin-left: auto; }
      .toggle .badge.warn { color: var(--moderate); border-color: var(--moderate); }
      .legend { display: flex; flex-direction: column; gap: 6px; }
      .legend-row { display: flex; align-items: center; gap: 9px; font-size: 12px; }
      .legend-sw { width: 12px; height: 12px; border-radius: 3px; flex: none; }
      .legend-note { font-size: 11px; color: var(--text-muted); margin: 8px 0 0; line-height: 1.4; }
      .detail { display: flex; flex-direction: column; gap: 5px; max-height: 260px; overflow-y: auto; }
      .detail-row { display: flex; justify-content: space-between; gap: 12px; font-size: 12px; }
      .detail-k { color: var(--text-muted); flex: none; max-width: 48%; }
      .detail-v { text-align: right; word-break: break-word; }
      .muted { font-size: 12px; color: var(--text-muted); margin: 0; }
      .prov { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
      .prov strong { color: var(--text-secondary); }
      .skeleton { animation: pulse 1.4s ease-in-out infinite; background: var(--skeleton); border-color: transparent; border-radius: var(--radius); }
      .sk-stat { height: 64px; } .sk-chart { height: 96px; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
      @media (prefers-reduced-motion: reduce) { .skeleton { animation: none; } * { scroll-behavior: auto; } }
      details > summary { cursor: pointer; }
      .ctx summary { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); list-style: none; }
      .ctx summary::-webkit-details-marker { display: none; }
      .ctx summary::before { content: "▸ "; } .ctx[open] summary::before { content: "▾ "; }
      @media (max-width: 768px) {
        .app { flex-direction: column; } #map { min-height: 45vh; }
        .sidebar { width: auto; border-left: none; border-top: 1px solid var(--border); }
      }
    </style>
  </head>
  <body>
    <div class="app" id="app" data-theme="light">
      <div id="map"></div>
      <aside class="sidebar">
        <div class="head">
          <div>
            <h1 id="title">Santa Barbara — Fire Response Gap Analysis</h1>
            <div class="count" id="count">Loading…</div>
          </div>
          <button class="theme-btn" id="theme" aria-label="Toggle light/dark theme">◐</button>
        </div>
        <p class="app-desc">Explore where Santa Barbara's evacuation zones are least covered today, and review candidate sites for a new fire station. Read "How this was made" before drawing conclusions — this is a screening view, not a formal siting study.</p>
        <div class="content" id="content">
          <div class="stat-grid">
            <div class="stat skeleton sk-stat"></div><div class="stat skeleton sk-stat"></div>
            <div class="stat skeleton sk-stat"></div><div class="stat skeleton sk-stat"></div>
          </div>
          <div class="skeleton sk-chart"></div>
        </div>
      </aside>
    </div>

    <script type="module">
      import { Felt } from "https://esm.sh/@feltmaps/js-sdk@1.10.0";

      const CONFIG = { mapId: "bXK9BCeAzTTijymyBtzGEGC" };
      const COVERAGE_COLORS = { Good: "#94a3b8", Moderate: "#e8900a", Poor: "#d12b2b" };
      const COV_ORDER = ["Poor", "Moderate", "Good"];

      // Escape ALL map-derived strings before inserting into innerHTML (stored-XSS guard).
      const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      const fmt = (v) => {
        if (v == null || Number.isNaN(v)) return "—";
        const a = Math.abs(v);
        if (a >= 1e6) return (v / 1e6).toFixed(2) + "M";
        if (a >= 1e4) return (v / 1e3).toFixed(1) + "K";
        if (Number.isInteger(v)) return v.toLocaleString();
        return v.toFixed(1);
      };
      const el = (t, c) => { const e = document.createElement(t); if (c) e.className = c; return e; };
      const andF = (a, b) => (!a ? b : !b ? a : [a, "and", b]);

      // cleanup discipline: every subscription / interval registers here
      const cleanups = [];

      async function init() {
        const felt = await Felt.embed(document.getElementById("map"), CONFIG.mapId, {
          uiControls: { showLegend: false, cooperativeGestures: false },
        });

        const layers = (await felt.getLayers()).filter(Boolean);
        const byName = (n) => layers.find((l) => l.name === n);
        const primary = byName("Evacuation Route Coverage Gaps");
        const suggested = byName("Suggested New Fire Station Locations");

        const ANALYSIS = new Set([
          "Evacuation Route Coverage Gaps",
          "Suggested New Fire Station Locations",
          "Fire Stations",
          "Fire Station Response Areas",
        ]);
        const isAnalysis = (l) => ANALYSIS.has(l.name);
        await felt.setLayerVisibility({
          show: layers.filter(isAnalysis).map((l) => l.id),
          hide: layers.filter((l) => !isAnalysis(l)).map((l) => l.id),
        });

        // Parallel schema fan-out (not serial): name maps + feature counts.
        const schemas = await Promise.all(layers.map((l) => felt.getLayerSchema(l.id).catch(() => null)));
        const nameMaps = {}, featCount = {};
        layers.forEach((l, i) => {
          const s = schemas[i];
          const m = {}; (s?.attributes || []).forEach((a) => (m[a.id] = a.displayName));
          nameMaps[l.id] = m; featCount[l.id] = s?.featureCount ?? null;
        });

        const pid = primary.id;
        const TOTAL = featCount[pid] ?? 342;
        document.getElementById("count").textContent = `${TOTAL.toLocaleString()} evacuation zones`;

        // ---- Data-honesty audit: which primary numeric attrs are actually usable? ----
        const CANDIDATE_NUMS = ["hazard_score", "acres", "dist_to_route_m", "fire_very_high", "flood"];
        const audit = {};
        await Promise.all(CANDIDATE_NUMS.map(async (a) => {
          try {
            const r = await felt.getAggregates({ layerId: pid, aggregation: { methods: ["min", "max", "count"], attribute: a } });
            const distinctish = r.min != null && r.max != null ? r.max - r.min : null;
            audit[a] = { count: r.count ?? 0, min: r.min, max: r.max,
              allNull: (r.count ?? 0) === 0 || r.min == null,
              degenerate: distinctish != null && distinctish <= 1 };
          } catch { audit[a] = { allNull: true }; }
        }));
        const usableNum = (a) => audit[a] && !audit[a].allNull && !audit[a].degenerate;

        // ---- Composed AND-tied filters on the primary ----
        const sources = new Map();
        async function applyFilters() {
          const t = [...sources.values()];
          const filters = t.length === 0 ? null : t.reduce((acc, x) => andF(acc, x));
          await felt.setLayerFilters({ layerId: pid, filters });
          refreshStats(); updateFltCount();
        }
        const setSource = (k, tuple) => { tuple ? sources.set(k, tuple) : sources.delete(k); applyFilters(); };
        const lockedFilters = () => {
          const t = [...sources.entries()].filter(([k]) => !k.endsWith("-hover")).map(([, x]) => x);
          return t.length === 0 ? null : t.reduce((acc, x) => andF(acc, x));
        };

        const content = document.getElementById("content");
        content.innerHTML = "";

        // ---- How this was made (methodology + caveats) — required for a public-safety view ----
        const method = el("details", "block method"); method.open = true;
        method.innerHTML = `<summary>How this was made — read first</summary>
          <div class="body">
            <p><strong>What this shows.</strong> ${esc(String(TOTAL))} evacuation zones rated by how well existing fire-station response areas cover them (Good / Moderate / Poor), with candidate sites for a new station.</p>
            <p class="caveat"><strong>How the candidate sites were chosen.</strong> They are the centroids of the hex cells that overlap the most under-covered zones — a coverage <em>heuristic</em>, ranked by how many zones each touches. This is <strong>not</strong> a response-time (isochrone), road-network, population, or calls-for-service optimization.</p>
            <p class="caveat"><strong>What's missing / not trustworthy.</strong> The Social Vulnerability layer present on the map is <strong>not</strong> joined to these zones, so equity is not factored in. The fire-hazard and flood inputs are broad yes/no overlays (most zones carry at least one), not graded risk. Existing Fire Stations / Hospitals shown are national datasets, not clipped to Santa Barbara.</p>
            <p><strong>Use it to</strong> screen and prioritize for discussion — not as the basis for a final siting decision.</p>
          </div>`;
        content.appendChild(method);

        // ---- Stat cards: honest counts of the currently-shown set (no avg of a 1–2 flag) ----
        const statBlock = el("div", "stat-grid"); content.appendChild(statBlock);
        const STATS = [
          { label: "Zones shown", f: () => null },
          { label: "Coverage gaps (Poor + Moderate)", f: () => ["coverage", "in", ["Poor", "Moderate"]] },
          { label: "In very-high fire hazard", f: () => usableNum("fire_very_high") || audit.fire_very_high?.allNull === false ? ["fire_very_high", "eq", 1] : null },
          { label: "In flood-risk area", f: () => audit.flood?.allNull === false ? ["flood", "eq", 1] : null },
        ];
        const statValEls = STATS.map((s) => {
          const card = el("div", "stat");
          card.innerHTML = `<div class="v">—</div><div class="l">${esc(s.label)}</div>`;
          statBlock.appendChild(card);
          return card.querySelector(".v");
        });
        let statRun = 0;
        async function refreshStats() {
          const my = ++statRun;
          const base = lockedFilters();
          const res = await Promise.all(STATS.map((s) =>
            felt.getAggregates({ layerId: pid, filters: andF(base, s.f()), aggregation: { methods: ["count"] } })));
          if (my !== statRun) return;
          res.forEach((r, i) => (statValEls[i].textContent = fmt(r.count)));
        }
        await refreshStats();

        // ---- Coverage breakdown (the real story); Good is muted so the 6 Poor zones aren't buried ----
        const barBlock = el("div", "block");
        barBlock.innerHTML = `<p class="block-title">Coverage of evacuation zones</p><div class="bars" id="bars" role="list"></div><p class="muted" id="bar-readout" aria-live="polite" style="margin-top:8px"></p>`;
        content.appendChild(barBlock);
        const cats = await felt.getCategoryData({ layerId: pid, attribute: "coverage" });
        const rows = cats.map((c) => ({ key: String(c.key), value: c.value }))
          .sort((a, b) => COV_ORDER.indexOf(a.key) - COV_ORDER.indexOf(b.key));
        const maxBar = Math.max(...rows.map((r) => r.value), 1);
        const barsEl = barBlock.querySelector("#bars");
        const readout = barBlock.querySelector("#bar-readout");
        let lockedCov = null;
        barsEl.addEventListener("mouseleave", () => { setSource("cov-hover", null); readout.textContent = ""; });
        rows.forEach((r) => {
          const pct = Math.round((r.value / TOTAL) * 100);
          const b = el("button", "bar-row"); b.type = "button"; b.setAttribute("role", "listitem");
          b.setAttribute("aria-label", `${r.key} coverage: ${r.value} zones, ${pct}%. Activate to filter the map.`);
          b.innerHTML = `<span class="bar-label">${esc(r.key)}</span><span class="bar-track"><span class="bar-fill" style="width:${(r.value / maxBar) * 100}%;background:${COVERAGE_COLORS[r.key] || "#888"}"></span></span><span class="bar-val">${fmt(r.value)} · ${pct}%</span>`;
          const describe = () => (readout.textContent = `${r.key}: ${fmt(r.value)} of ${TOTAL} zones (${pct}%).`);
          b.addEventListener("mouseenter", () => { setSource("cov-hover", ["coverage", "eq", r.key]); describe(); });
          b.addEventListener("focus", describe);
          b.addEventListener("click", () => {
            lockedCov = lockedCov === r.key ? null : r.key;
            [...barsEl.children].forEach((c) => c.classList.remove("locked"));
            if (lockedCov) b.classList.add("locked");
            setSource("cov-lock", lockedCov ? ["coverage", "eq", lockedCov] : null);
          });
          barsEl.appendChild(b);
        });

        // ---- Zone size: honest summary instead of a skew-collapsed histogram ----
        if (usableNum("acres")) {
          const fc = await felt.getFeatures({ layerId: pid, pageSize: 1000, select: ["acres"] }).catch(() => null);
          const vals = ((fc?.features) || []).map((f) => f.properties?.acres).filter((v) => typeof v === "number").sort((a, b) => a - b);
          if (vals.length) {
            const q = (p) => vals[Math.min(vals.length - 1, Math.floor(p * vals.length))];
            const distBlock = el("div", "block");
            distBlock.innerHTML = `<p class="block-title">Zone size</p>
              <p class="dist">Zone area is highly uneven — a few very large zones skew the average, so here's the spread instead:<br>
              Half of the ${esc(String(vals.length))} zones are under <strong>${fmt(q(0.5))} acres</strong>; 90% are under <strong>${fmt(q(0.9))} acres</strong>; the largest is <strong>${fmt(vals[vals.length - 1])} acres</strong>.</p>`;
            content.appendChild(distBlock);
          }
        }

        // ---- Find priority gaps (legible filter) ----
        const fltBlock = el("div", "block");
        fltBlock.innerHTML = `<p class="block-title">Find priority gaps</p>
          <p class="flt-help">Narrow the map to the evacuation zones that need a new station most. Pick how well they're covered today, then optionally limit to high-risk areas.</p>
          <div class="flt-group"><span class="flt-label">Show zones with coverage:</span></div>
          <div class="flt-covs" id="flt-covs"></div>
          <p class="flt-hint">none selected = show all</p>
          <label class="toggle"><input type="checkbox" id="flt-fire" /> Only in very-high fire-hazard areas <span class="badge" id="b-fire"></span></label>
          <label class="toggle"><input type="checkbox" id="flt-flood" /> Only in flood-risk areas <span class="badge" id="b-flood"></span></label>
          <p class="flt-count" id="flt-count">Showing all ${esc(String(TOTAL))} zones</p>`;
        content.appendChild(fltBlock);
        const covSel = new Set();
        const applyCov = () => setSource("flt-coverage", covSel.size && covSel.size < 3 ? ["coverage", "in", [...covSel]] : null);
        async function updateFltCount() {
          const r = await felt.getAggregates({ layerId: pid, filters: lockedFilters(), aggregation: { methods: ["count"] } });
          const c = fltBlock.querySelector("#flt-count");
          c.textContent = r.count === TOTAL ? `Showing all ${TOTAL} zones` : `Showing ${fmt(r.count)} of ${TOTAL} zones`;
          c.classList.toggle("active", r.count !== TOTAL);
        }
        const covsEl = fltBlock.querySelector("#flt-covs");
        COV_ORDER.forEach((c) => {
          const chip = el("button", "flt-chip"); chip.type = "button"; chip.textContent = c;
          chip.style.setProperty("--chip", COVERAGE_COLORS[c]);
          chip.setAttribute("aria-pressed", "false");
          chip.addEventListener("click", () => {
            const on = !covSel.has(c); on ? covSel.add(c) : covSel.delete(c);
            chip.classList.toggle("on", on); chip.setAttribute("aria-pressed", String(on)); applyCov();
          });
          covsEl.appendChild(chip);
        });
        // honest discrimination badges: how many zones each flag actually covers
        if (audit.fire_very_high?.allNull === false) {
          const r = await felt.getAggregates({ layerId: pid, filters: ["fire_very_high", "eq", 1], aggregation: { methods: ["count"] } });
          fltBlock.querySelector("#b-fire").textContent = `${Math.round((r.count / TOTAL) * 100)}% of zones`;
        }
        if (audit.flood?.allNull === false) {
          const r = await felt.getAggregates({ layerId: pid, filters: ["flood", "eq", 1], aggregation: { methods: ["count"] } });
          fltBlock.querySelector("#b-flood").textContent = `${Math.round((r.count / TOTAL) * 100)}% of zones`;
        }
        fltBlock.querySelector("#flt-fire").addEventListener("change", (e) => setSource("flt-fire", e.target.checked ? ["fire_very_high", "eq", 1] : null));
        fltBlock.querySelector("#flt-flood").addEventListener("change", (e) => setSource("flt-flood", e.target.checked ? ["flood", "eq", 1] : null));

        // ---- Candidate sites (honestly labeled, not "optimal") ----
        if (suggested) {
          const recBlock = el("div", "block");
          recBlock.innerHTML = `<p class="block-title">Candidate sites for a new station</p><div class="rank" id="rank"></div>
            <p class="method-note">Ranked by number of evacuation zones each candidate would touch. A coverage heuristic — not a response-time or population-weighted siting model. Click a row to locate it.</p>`;
          content.appendChild(recBlock);
          const feats = await felt.getFeatures({ layerId: suggested.id, sorting: { attribute: "zones_served", direction: "desc" }, pageSize: 10 }).catch(() => null);
          const list = (feats?.features) || [];
          const rankEl = recBlock.querySelector("#rank");
          list.forEach((f, i) => {
            const p = f.properties || {};
            const row = el("button", "rank-row"); row.type = "button";
            const name = p.suggested_station ?? "Site " + (i + 1);
            row.setAttribute("aria-label", `${name}: would touch ${fmt(p.zones_served)} evacuation zones. Activate to locate on map.`);
            row.innerHTML = `<span class="rank-n">${i + 1}</span><span><div class="rank-name">${esc(name)}</div><div class="rank-sub">evacuation zones it would touch</div></span><span class="rank-val">${fmt(p.zones_served)}</span>`;
            row.addEventListener("click", async () => { try { await felt.selectFeature({ layerId: suggested.id, featureId: f.id }); } catch {} });
            rankEl.appendChild(row);
          });
        }

        // ---- Layer toggles with feature-count badges (perf honesty) ----
        function toggleRow(l) {
          const on = isAnalysis(l);
          const n = featCount[l.id];
          const row = el("label", "toggle");
          const cb = el("input"); cb.type = "checkbox"; cb.checked = on;
          cb.addEventListener("change", (e) => felt.setLayerVisibility(e.target.checked ? { show: [l.id] } : { hide: [l.id] }));
          row.appendChild(cb);
          row.appendChild(document.createTextNode(" " + l.name));
          if (n != null) { const badge = el("span", "badge" + (n > 50000 ? " warn" : "")); badge.textContent = n > 50000 ? `${fmt(n)} pts · may be slow` : `${fmt(n)}`; row.appendChild(badge); }
          return row;
        }
        const ctx = layers.filter((l) => l !== primary);
        const ctxBlock = el("div", "block");
        ctxBlock.innerHTML = `<p class="block-title">Analysis layers</p><div class="toggles" id="t-an"></div>
          <details class="ctx" style="margin-top:12px"><summary>More context (off — some are large national datasets)</summary><div class="toggles" id="t-other" style="margin-top:8px"></div></details>`;
        content.appendChild(ctxBlock);
        ctx.filter(isAnalysis).forEach((l) => ctxBlock.querySelector("#t-an").appendChild(toggleRow(l)));
        ctx.filter((l) => !isAnalysis(l)).forEach((l) => ctxBlock.querySelector("#t-other").appendChild(toggleRow(l)));

        // ---- Legend (complete: coverage + candidate-site symbol + overlay note) ----
        const legBlock = el("div", "block");
        legBlock.innerHTML = `<p class="block-title">Legend</p><div class="legend">
          ${COV_ORDER.slice().reverse().map((k) => `<div class="legend-row"><span class="legend-sw" style="background:${COVERAGE_COLORS[k]}"></span>${esc(k)} coverage${k === "Good" ? " (muted)" : ""}</div>`).join("")}
          <div class="legend-row"><span class="legend-sw" style="background:#CCFF00;border-radius:50%"></span>Candidate new-station site</div>
        </div><p class="legend-note">Fire stations, response areas, hazard and flood overlays also draw on the map; toggle them under Analysis / More context.</p>`;
        content.appendChild(legBlock);

        // ---- Detail panel: escaped, and all-NULL fields hidden ----
        const detBlock = el("div", "block");
        detBlock.innerHTML = `<p class="block-title">Feature details</p><div id="detail"><p class="muted">Click any feature on the map to inspect it.</p></div>`;
        content.appendChild(detBlock);
        const detEl = detBlock.querySelector("#detail");
        const unsub = felt.onPointerClick({
          handler: (e) => {
            const f = e.features && e.features[0];
            if (!f) return;
            const m = nameMaps[f.layerId] || {};
            const props = f.properties || {};
            const keys = Object.keys(props).filter((k) => !k.startsWith("felt:") && props[k] != null && props[k] !== "").slice(0, 30);
            detEl.innerHTML = keys.length
              ? `<div class="detail">${keys.map((k) => `<div class="detail-row"><span class="detail-k">${esc(m[k] || k)}</span><span class="detail-v">${esc(String(props[k]))}</span></div>`).join("")}</div>`
              : `<p class="muted">No populated attributes on this feature.</p>`;
          },
        });
        if (typeof unsub === "function") cleanups.push(unsub);

        // ---- Provenance ----
        const provBlock = el("div", "block");
        provBlock.innerHTML = `<p class="prov"><strong>Source.</strong> Felt map "Santa Barbara, CA Data Explorer". Coverage ratings and candidate sites are derived analysis layers in that map. Fire Stations (national USGS), Hospitals & Clinics (OpenStreetMap) and Social Vulnerability (CDC SVI) are reference layers shown unclipped. No data vintage is published with the source — treat currency as unknown.</p>`;
        content.appendChild(provBlock);

        // ---- Theme toggle ----
        const app = document.getElementById("app");
        document.getElementById("theme").addEventListener("click", () => { app.dataset.theme = app.dataset.theme === "light" ? "dark" : "light"; });

        window.addEventListener("beforeunload", () => cleanups.forEach((fn) => { try { fn(); } catch {} }));
        window.__ready = true;
      }

      init().catch((err) => {
        console.error("SDK failed:", err);
        document.getElementById("content").innerHTML =
          `<p class="muted" style="padding:20px">Could not load the map. <a href="https://felt.com/map/${CONFIG.mapId}" target="_blank" rel="noreferrer">View it on Felt</a>.</p>`;
      });
    </script>
  </body>
</html>
