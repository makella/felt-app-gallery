<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Within Reach? — A Fire Coverage Story</title>
    <style>
      .app {
        --bg: #f6f7f9; --card: #ffffff; --border: #e4e7ec; --text: #101828;
        --text-secondary: #475467; --text-muted: #667085; --accent: #d12b2b;
        --accent-ui: #d12b2b; --focus: #1d4ed8; --radius: 12px;
        display: flex; height: 100vh; color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .app[data-theme="dark"] {
        --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #f1f5f9;
        --text-secondary: #cbd5e1; --text-muted: #94a3b8; --accent-ui: #f87171; --focus: #93c5fd;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      :focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: 4px; }
      @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; } }

      .panel {
        width: 408px; flex: none; display: flex; flex-direction: column;
        background: var(--bg); border-right: 1px solid var(--border);
      }
      #map { flex: 1; min-width: 50%; }
      .kicker { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent-ui); margin: 0 0 6px; }
      .head { padding: 22px 24px 0; }
      .head h1 { font-size: 21px; letter-spacing: -0.02em; margin: 0; line-height: 1.25; }
      .head .sub { font-size: 12.5px; color: var(--text-muted); margin: 6px 0 0; }
      .beat { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; }
      .beat-title { font-size: 17px; font-weight: 650; line-height: 1.3; margin: 0 0 10px; }
      .beat-body { font-size: 14px; line-height: 1.55; color: var(--text-secondary); margin: 0 0 18px; }
      .callout {
        background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--accent-ui);
        border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px;
      }
      .callout .n { font-size: 30px; font-weight: 750; line-height: 1.1; font-variant-numeric: tabular-nums; }
      .callout .l { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
      .foot { padding: 14px 24px 20px; border-top: 1px solid var(--border); background: var(--card); }
      .dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 12px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); border: none; padding: 0; cursor: pointer; }
      .dot.on { background: var(--accent-ui); }
      .nav { display: flex; gap: 8px; }
      .nav button {
        flex: 1; font: inherit; font-size: 13.5px; font-weight: 550; padding: 9px 14px;
        border-radius: 9px; cursor: pointer; border: 1px solid var(--border);
        background: var(--card); color: var(--text);
      }
      .nav button.primary { background: var(--accent-ui); border-color: var(--accent-ui); color: #fff; }
      .nav button:disabled { opacity: 0.45; cursor: not-allowed; }
      .hint { font-size: 11px; color: var(--text-muted); text-align: center; margin: 8px 0 0; }
      .theme-btn { position: absolute; top: 14px; right: 14px; z-index: 5; font: inherit; width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; }
      .skeleton { height: 68px; border-radius: var(--radius); background: var(--border); animation: pulse 1.4s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
      @media (max-width: 768px) {
        .app { flex-direction: column; }
        #map { min-height: 44vh; order: -1; }
        .panel { width: auto; border-right: none; border-top: 1px solid var(--border); }
      }
    </style>
  </head>
  <body>
    <div class="app" id="app" data-theme="light">
      <aside class="panel">
        <div class="head">
          <p class="kicker">A guided story · Santa Barbara County</p>
          <h1>Within reach?</h1>
          <p class="sub">What fire-station coverage looks like for 342 evacuation zones — and where a new station would matter most.</p>
        </div>
        <div class="beat">
          <h2 class="beat-title" id="b-title">Loading the map…</h2>
          <div class="beat-body" id="b-body"><div class="skeleton"></div></div>
          <div class="callout" id="b-callout" hidden>
            <div class="n" id="b-num">—</div>
            <div class="l" id="b-label"></div>
          </div>
        </div>
        <div class="foot">
          <div class="dots" id="dots" role="tablist" aria-label="Story progress"></div>
          <div class="nav">
            <button type="button" id="prev">← Previous</button>
            <button type="button" id="next" class="primary">Next →</button>
          </div>
          <p class="hint">Use ← → arrow keys to navigate</p>
        </div>
      </aside>
      <div id="map"></div>
      <button class="theme-btn" id="theme" aria-label="Toggle light/dark theme">◐</button>
    </div>

    <script type="module">
      import { Felt } from "https://esm.sh/@feltmaps/js-sdk@1.10.0";

      const CONFIG = { mapId: "bXK9BCeAzTTijymyBtzGEGC" };
      const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

      // ---- The beats: each declares its FULL map state (order-independent) ----
      // viewport coords chosen from the map's geography; stats computed live.
      const FULL = { center: { latitude: 34.62, longitude: -120.0 }, zoom: 8.6 };
      const COAST = { center: { latitude: 34.46, longitude: -119.78 }, zoom: 10.2 };
      const BEATS = [
        {
          title: "Can every neighborhood be reached in time?",
          body: "Santa Barbara County divides into evacuation zones — the unit emergency planners think in. This map rates every zone by how well today's fire-station response areas cover it. Step through to see where coverage holds, where it thins, and what could close the gaps.",
          viewport: FULL, filters: null, showSuggested: false,
          stat: { filters: null, label: "evacuation zones evaluated" },
        },
        {
          title: "Most of the county is within reach",
          body: "The good news first: 85% of zones sit comfortably inside an existing station's response area. For most residents, help is close.",
          viewport: FULL, filters: ["coverage", "eq", "Good"], showSuggested: false,
          stat: { filters: ["coverage", "eq", "Good"], label: "zones with good coverage (85%)" },
        },
        {
          title: "But 51 zones are not",
          body: "Filter to the zones rated Moderate or Poor and a pattern appears: the under-covered zones aren't scattered randomly — they cluster. These are the places where response times stretch.",
          viewport: FULL, filters: ["coverage", "in", ["Poor", "Moderate"]], showSuggested: false,
          stat: { filters: ["coverage", "in", ["Poor", "Moderate"]], label: "zones under-covered today" },
        },
        {
          title: "Six are effectively uncovered",
          body: "Six zones rate Poor — outside every station's response area. If a fast-moving fire starts here, coverage isn't thin; it's absent. This is the core of the problem.",
          viewport: COAST, filters: ["coverage", "eq", "Poor"], showSuggested: false,
          stat: { filters: ["coverage", "eq", "Poor"], label: "zones with no effective coverage" },
        },
        {
          title: "Where the risk stacks up",
          body: "Now add hazard: keep the under-covered zones and show only those that also sit in a very-high fire-hazard area. These zones combine the worst of both — hard to reach and likely to burn.",
          viewport: FULL, filters: [["coverage", "in", ["Poor", "Moderate"]], "and", ["fire_very_high", "eq", 1]], showSuggested: false,
          stat: { filters: [["coverage", "in", ["Poor", "Moderate"]], "and", ["fire_very_high", "eq", 1]], label: "under-covered zones in very-high fire hazard" },
        },
        {
          title: "Five candidate sites could close the gaps",
          body: "The analysis proposes five candidate locations for a new station (the yellow markers), ranked by how many under-covered zones each would touch — the best touches six. One honest caveat: these are coverage heuristics from a hex-grid screen, not a response-time or population-weighted siting model.",
          viewport: { center: { latitude: 34.5, longitude: -119.95 }, zoom: 9.3 }, filters: ["coverage", "in", ["Poor", "Moderate"]], showSuggested: true,
          stat: { fixed: 5, label: "candidate sites — best touches 6 zones" },
        },
        {
          title: "A screening view — and a starting point",
          body: "This story is a screen, not a siting study: hazard inputs are broad yes/no overlays, and social vulnerability isn't factored in yet. But it points the conversation somewhere specific — six uncovered zones and five places a station could go. Explore the data yourself in the companion gap-explorer app.",
          viewport: FULL, filters: null, showSuggested: true,
          stat: { filters: null, label: "zones — explore them in the gap explorer" },
        },
      ];

      const $ = (id) => document.getElementById(id);
      let felt, evacId, suggestedId;
      let current = 0;
      let animating = false;
      let renderSeq = 0;

      async function renderBeat(index) {
        const seq = ++renderSeq;
        current = Math.max(0, Math.min(BEATS.length - 1, index));
        const beat = BEATS[current];

        // narrative
        $("b-title").textContent = beat.title;
        $("b-body").textContent = beat.body;
        $("prev").disabled = current === 0;
        $("next").textContent = current === BEATS.length - 1 ? "Start over ↺" : "Next →";
        [...$("dots").children].forEach((d, i) => d.classList.toggle("on", i === current));
        location.hash = `beat-${current + 1}`;

        // full map state (order-independent)
        await felt.setLayerFilters({ layerId: evacId, filters: beat.filters });
        if (suggestedId) {
          await felt.setLayerVisibility(beat.showSuggested ? { show: [suggestedId] } : { hide: [suggestedId] });
        }

        // viewport — never mid-animation
        if (!animating) {
          animating = true;
          await felt.setViewport(beat.viewport);
          setTimeout(() => { animating = false; }, 900);
        }

        // live callout stat
        const co = $("b-callout");
        if (beat.stat) {
          co.hidden = false;
          if (beat.stat.fixed != null) {
            $("b-num").textContent = String(beat.stat.fixed);
          } else {
            $("b-num").textContent = "…";
            const res = await felt.getAggregates({ layerId: evacId, filters: beat.stat.filters, aggregation: { methods: ["count"] } });
            if (seq !== renderSeq) return; // superseded by a newer beat
            $("b-num").textContent = (res.count ?? 0).toLocaleString();
          }
          $("b-label").textContent = beat.stat.label;
        } else {
          co.hidden = true;
        }
      }

      async function init() {
        felt = await Felt.embed($("map"), CONFIG.mapId, {
          uiControls: { showLegend: false, cooperativeGestures: false },
        });

        const layers = (await felt.getLayers()).filter(Boolean);
        const evac = layers.find((l) => l.name === "Evacuation Route Coverage Gaps");
        const suggested = layers.find((l) => l.name === "Suggested New Fire Station Locations");
        const stations = layers.find((l) => l.name === "Fire Stations");
        const areas = layers.find((l) => l.name === "Fire Station Response Areas");
        evacId = evac.id; suggestedId = suggested?.id;

        // Curate: only the story's layers on; suggested sites enter at their beat.
        const keep = new Set([evac?.id, stations?.id, areas?.id].filter(Boolean));
        await felt.setLayerVisibility({
          show: [...keep],
          hide: layers.filter((l) => !keep.has(l.id)).map((l) => l.id),
        });

        // dots + nav + keyboard
        BEATS.forEach((_, i) => {
          const d = document.createElement("button");
          d.className = "dot"; d.type = "button";
          d.setAttribute("role", "tab");
          d.setAttribute("aria-label", `Go to part ${i + 1} of ${BEATS.length}`);
          d.addEventListener("click", () => renderBeat(i));
          $("dots").appendChild(d);
        });
        $("prev").addEventListener("click", () => renderBeat(current - 1));
        $("next").addEventListener("click", () => renderBeat(current === BEATS.length - 1 ? 0 : current + 1));
        document.addEventListener("keydown", (e) => {
          if (e.key === "ArrowRight") renderBeat(current + 1);
          if (e.key === "ArrowLeft") renderBeat(current - 1);
        });
        $("theme").addEventListener("click", () => {
          const app = $("app");
          app.dataset.theme = app.dataset.theme === "light" ? "dark" : "light";
        });

        // deep link
        const m = location.hash.match(/beat-(\d+)/);
        await renderBeat(m ? parseInt(m[1], 10) - 1 : 0);
        window.__ready = true;
      }

      init().catch((err) => {
        console.error("SDK failed:", err);
        $("b-title").textContent = "Could not load the map.";
        $("b-body").innerHTML = `View it directly on Felt: <a href="https://felt.com/map/${CONFIG.mapId}" target="_blank" rel="noreferrer">felt.com/map/${esc(CONFIG.mapId)}</a>`;
      });
    </script>
  </body>
</html>
